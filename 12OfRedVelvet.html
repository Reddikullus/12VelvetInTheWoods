<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>12Velvet In The Woods — Twibbon</title>
<style>
  :root{
    --bg:#2f2b1f;
    --panel:#3a3527;
    --accent:#c9a86a;
    --accent2:#8a9a6f;
    --text:#f4efe0;
    --muted:#b6ac93;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:Georgia,'Segoe UI',system-ui,serif;
    background:radial-gradient(circle at top, #46402e, #1f1c14 70%);
    color:var(--text);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .wrap{
    max-width:460px;
    width:100%;
  }

  /* ---- info card ---- */
  .info-card{
    background:var(--panel);
    border-radius:20px;
    padding:28px 24px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.06);
    margin-bottom:16px;
  }
  .logo{
    width:88px;
    height:88px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid var(--accent);
    margin-bottom:14px;
    background:#000;
  }
  .campaign-name{
    font-size:1.25rem;
    font-weight:700;
    margin:0 0 6px;
    line-height:1.3;
  }
  .campaign-desc{
    font-size:.85rem;
    color:var(--muted);
    margin:0 0 6px;
    line-height:1.5;
  }
  .campaign-date{
    font-size:.75rem;
    color:var(--muted);
    margin:0 0 18px;
  }
  .supporter-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    border-radius:999px;
    padding:10px 20px;
  }
  .supporter-pill .heart{
    color:var(--accent2);
    font-size:1.1rem;
  }
  .supporter-count{
    font-size:1.1rem;
    font-weight:700;
    color:var(--accent);
  }
  .supporter-label{
    font-size:.7rem;
    color:var(--muted);
    display:block;
  }

  /* ---- twibbon tool card ---- */
  .card{
    background:var(--panel);
    border-radius:20px;
    padding:28px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
    border:1px solid rgba(255,255,255,.06);
  }
  .canvas-wrap{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    border-radius:16px;
    overflow:hidden;
    background:#0e0a1c repeating-conic-gradient(#181227 0% 25%, #0e0a1c 0% 50%) 50% / 24px 24px;
    touch-action:none;
    cursor:grab;
  }
  .canvas-wrap:active{cursor:grabbing;}
  canvas{
    position:absolute;
    top:0;left:0;
    width:100%;
    height:100%;
  }
  .controls{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .row{display:flex; gap:10px;}
  label.file-btn, button{
    flex:1;
    border:none;
    border-radius:10px;
    padding:12px 14px;
    font-size:.9rem;
    font-weight:600;
    cursor:pointer;
    text-align:center;
    transition:transform .15s ease, opacity .15s ease;
    font-family:inherit;
  }
  label.file-btn{
    background:rgba(255,255,255,.08);
    color:var(--text);
  }
  label.file-btn:hover, button:hover{transform:translateY(-1px);}
  input[type=file]{display:none;}
  #zoomRange{width:100%;}
  .zoom-label{font-size:.8rem; color:var(--muted); display:flex; justify-content:space-between;}
  #resetBtn{
    background:rgba(255,255,255,.08);
    color:var(--text);
  }
  #downloadBtn{
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    color:#fff;
  }
  #downloadBtn:disabled{opacity:.4; cursor:not-allowed; transform:none;}
  .hint{
    font-size:.72rem;
    color:var(--muted);
    text-align:center;
    margin-top:14px;
    line-height:1.4;
  }
</style>
</head>
<body>

<div class="wrap">

  <!-- ===== INFO CARD ===== -->
  <div class="info-card">
    <img class="logo" id="logoImg" src="" alt="logo">
    <p class="campaign-name" id="campaignName">#12VelvetInTheWoods</p>
    <p class="campaign-desc" id="campaignDesc">and so they all went on a picnic together — rayakan bareng Red Velvet</p>
    <p class="campaign-date" id="campaignDate">Diupload 1 Agustus 2026</p>
    <div class="supporter-pill">
      <span class="heart">♥</span>
      <span>
        <span class="supporter-count" id="supporterCount">–</span>
        <span class="supporter-label">Pendukung</span>
      </span>
    </div>
  </div>

  <!-- ===== TWIBBON TOOL ===== -->
  <div class="card">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="photoCanvas" width="1080" height="1080"></canvas>
      <canvas id="frameCanvas" width="1080" height="1080"></canvas>
    </div>

    <div class="controls">
      <div class="row">
        <label class="file-btn" for="photoInput">📷 Upload Foto</label>
        <input type="file" id="photoInput" accept="image/*">
      </div>

      <div>
        <div class="zoom-label"><span>Zoom</span><span id="zoomVal">100%</span></div>
        <input type="range" id="zoomRange" min="50" max="300" value="100">
      </div>

      <div class="row">
        <button id="resetBtn">↺ Reset Posisi</button>
        <button id="downloadBtn" disabled>⬇ Download HD</button>
      </div>
    </div>

    <p class="hint">Drag foto untuk mengatur posisi, geser slider buat zoom, lalu unduh hasilnya dalam kualitas HD.</p>
  </div>

</div>

document.getElementById('logoImg').src = CONFIG.logoDataUrl;
document.getElementById('campaignName').textContent = CONFIG.campaignName;
document.getElementById('campaignDesc').textContent = CONFIG.campaignDesc;
document.getElementById('campaignDate').textContent = "Diupload " + CONFIG.campaignDate;

const COUNTER_BASE = "https://countapi.mileshilliard.com/api/v1";
const countEl = document.getElementById('supporterCount');

// Show current count on load (GET only, doesn't increase it)
fetch(`${COUNTER_BASE}/get/${CONFIG.counterKey}`)
  .then(r => r.ok ? r.json() : {value: 0})
  .then(d => countEl.textContent = d.value ?? 0)
  .catch(() => countEl.textContent = "0");

function bumpSupporterCount(){
  fetch(`${COUNTER_BASE}/hit/${CONFIG.counterKey}`)
    .then(r => r.json())
    .then(d => countEl.textContent = d.value)
    .catch(() => {});
}

const photoCanvas = document.getElementById('photoCanvas');
const frameCanvas = document.getElementById('frameCanvas');
const pCtx = photoCanvas.getContext('2d');
const fCtx = frameCanvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const zoomRange = document.getElementById('zoomRange');
const zoomVal = document.getElementById('zoomVal');
const downloadBtn = document.getElementById('downloadBtn');
const resetBtn = document.getElementById('resetBtn');
const SIZE = 1080;

let photoImg = null;
let frameImg = null;
let scale = 1, baseScale = 1;
let offsetX = 0, offsetY = 0;
let dragging = false, lastX = 0, lastY = 0;

function loadImage(src){
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = src;
  });
}

async function initFrame(){
  frameImg = await loadImage(CONFIG.frameDataUrl);
  drawFrame();
}

function drawFrame(){
  fCtx.clearRect(0,0,SIZE,SIZE);
  if(frameImg) fCtx.drawImage(frameImg, 0, 0, SIZE, SIZE);
}

function drawPhoto(){
  pCtx.clearRect(0,0,SIZE,SIZE);
  if(!photoImg) return;
  const w = photoImg.width * baseScale * scale;
  const h = photoImg.height * baseScale * scale;
  const x = SIZE/2 - w/2 + offsetX;
  const y = SIZE/2 - h/2 + offsetY;
  pCtx.drawImage(photoImg, x, y, w, h);
}

document.getElementById('photoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  photoImg = await loadImage(url);
  baseScale = Math.max(SIZE / photoImg.width, SIZE / photoImg.height);
  scale = 1; offsetX = 0; offsetY = 0;
  zoomRange.value = 100; zoomVal.textContent = '100%';
  drawPhoto();
  downloadBtn.disabled = false;
});

zoomRange.addEventListener('input', () => {
  scale = zoomRange.value / 100;
  zoomVal.textContent = zoomRange.value + '%';
  drawPhoto();
});

resetBtn.addEventListener('click', () => {
  scale = 1; offsetX = 0; offsetY = 0;
  zoomRange.value = 100; zoomVal.textContent = '100%';
  drawPhoto();
});

function getPos(e){
  const rect = wrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * (SIZE / rect.width),
    y: (clientY - rect.top) * (SIZE / rect.height)
  };
}

wrap.addEventListener('mousedown', (e) => {
  if(!photoImg) return;
  dragging = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
});
window.addEventListener('mousemove', (e) => {
  if(!dragging) return;
  const p = getPos(e);
  offsetX += (p.x - lastX);
  offsetY += (p.y - lastY);
  lastX = p.x; lastY = p.y;
  drawPhoto();
});
window.addEventListener('mouseup', () => dragging = false);

wrap.addEventListener('touchstart', (e) => {
  if(!photoImg) return;
  dragging = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
}, {passive:true});
wrap.addEventListener('touchmove', (e) => {
  if(!dragging) return;
  const p = getPos(e);
  offsetX += (p.x - lastX);
  offsetY += (p.y - lastY);
  lastX = p.x; lastY = p.y;
  drawPhoto();
  e.preventDefault();
}, {passive:false});
window.addEventListener('touchend', () => dragging = false);

downloadBtn.addEventListener('click', () => {
  const out = document.createElement('canvas');
  out.width = SIZE; out.height = SIZE;
  const octx = out.getContext('2d');
  octx.drawImage(photoCanvas, 0, 0);
  octx.drawImage(frameCanvas, 0, 0);
  const link = document.createElement('a');
  link.download = 'twibbon-hasil.png';
  link.href = out.toDataURL('image/png');
  link.click();
  bumpSupporterCount();
});

initFrame();
</script>
</body>
</html>
